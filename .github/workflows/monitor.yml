name: competitor-monitor

# 每天 UTC 01:17（≈ 北京时间 09:17）自动运行（跳过摘要，节约 API 成本）。
# 每周一 UTC 01:47（≈ 北京时间 09:47）运行一次含摘要生成的完整扫描。
# 注意：故意避开整点(:00) —— GitHub 定时任务在整点最拥堵、经常被延迟甚至丢弃，错开几分钟更可靠。
# 也可在 Actions 页面手动触发（可勾选 full_sweep 强制全量扫描）。
on:
  schedule:
    - cron: "17 1 * * *"    # 每日（跳过摘要）
    - cron: "47 1 * * 1"   # 每周一早 09:47（含摘要）
  workflow_dispatch:
    inputs:
      full_sweep:
        description: "强制全量扫描（忽略常规对象降频）"
        type: boolean
        default: true
      force_summary:
        description: "强制生成本次摘要（忽略 --no-summary 限制）"
        type: boolean
        default: false

permissions:
  contents: write      # 把抓取到的状态快照提交回仓库（用于跨次运行保留“已见”基线）
  pages: write         # 发布 GitHub Pages
  id-token: write      # Pages 部署鉴权

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  crawl-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        # 周一 → 含摘要生成；周二至周日 → 跳过摘要（--no-summary）
        # 手动触发且勾选 full_sweep 时加 --all 全量扫描。
        # 邮件开关由 config.py 的 email.enabled 决定；SMTP 账号密码从仓库 Secrets 注入。
        env:
          MONITOR_SMTP_USER: ${{ secrets.MONITOR_SMTP_USER }}
          MONITOR_SMTP_PASS: ${{ secrets.MONITOR_SMTP_PASS }}
          MONITOR_MAIL_TO: ${{ secrets.MONITOR_MAIL_TO }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # 强制摘要：周一自动，或手动勾选 force_summary
          if [ "1" = "$(date +%u)" ] || [ "${{ github.event.inputs.force_summary }}" = "true" ]; then
            export FORCE_DS_SUMMARY=1
            echo "摘要: 强制生成（AI）"
          fi
          if [ "${{ github.event.inputs.full_sweep }}" = "true" ]; then
            python run.py --all
          else
            python run.py
          fi

      - name: Commit state snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: update monitoring snapshot [skip ci]" || echo "no changes to commit"

      - name: Push snapshot (retry on race with other pushes, avoid silently losing data)
        run: |
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "推送成功"
              exit 0
            fi
            echo "第 ${i} 次推送被拒绝（远端在此期间有新提交），5秒后 rebase 重试..."
            sleep 5
            git fetch origin main
            # data/ 是本次运行刚生成的快照，冲突时以本次结果为准（-X ours），避免用旧数据覆盖新抓取结果
            git rebase origin/main -X ours || { git rebase --abort; echo "rebase 失败，跳过本次快照提交"; exit 0; }
          done
          echo "⚠️ 多次重试后仍推送失败，本次运行快照未能保存（不影响看板已部署，但下次运行会基于旧快照重新对比）"

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: data/site

  deploy:
    needs: crawl-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
