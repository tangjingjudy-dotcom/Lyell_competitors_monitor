name: competitor-monitor

# 每天 UTC 01:00（= 北京时间 09:00）自动运行；也可在 Actions 页面手动触发
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write      # 把抓取到的状态快照提交回仓库（用于跨次运行保留“已见”基线）
  pages: write         # 发布 GitHub Pages
  id-token: write      # Pages 部署鉴权

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  crawl-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler (no email)
        run: python run.py --no-email

      - name: Commit state snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: update monitoring snapshot [skip ci]" || echo "no changes to commit"
          git push || echo "nothing to push"

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: data/site

  deploy:
    needs: crawl-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
